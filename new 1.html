<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Τζεο Platform</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:800px;
text-align:center;
}

/* LANDING */
#landing h1{
font-size:60px;
margin-bottom:15px;
}

#landing p{
font-size:20px;
color:#cbd5e1;
margin-bottom:30px;
}

button{
padding:15px 30px;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2563eb;
transform:scale(1.05);
}

/* COMMENTS */
#app{
display:none;
width:100%;
text-align:left;
}

h2{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
padding:15px;
border-radius:12px;
border:none;
background:#111827;
color:white;
resize:none;
}

.comment{
background:#111827;
padding:15px;
border-radius:12px;
margin-top:10px;
position:relative;
}

.delete{
position:absolute;
top:10px;
right:10px;
background:red;
border:none;
color:white;
padding:5px 8px;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

small{
color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<!-- LANDING -->
<div id="landing">
<h1>Τζεο Platform</h1>
<p>Μια απλή πλατφόρμα για σχόλια και δημιουργία.</p>
<button onclick="start()">Ξεκίνα</button>
</div>

<!-- APP -->
<div id="app">

<h2>📝 Σχόλια</h2>

<textarea id="text" placeholder="Γράψε κάτι..."></textarea>
<button onclick="addComment()">Δημοσίευση</button>

<div id="list"></div>

</div>

</div>

<script>

let comments = JSON.parse(localStorage.getItem("comments") || "[]");

/* START APP */
function start(){
document.getElementById("landing").style.display="none";
document.getElementById("app").style.display="block";
render();
}

/* SAVE */
function save(){
localStorage.setItem("comments", JSON.stringify(comments));
}

/* ADD */
function addComment(){
let text = document.getElementById("text").value;
if(!text.trim()) return;

comments.unshift({
text,
time:new Date().toLocaleString()
});

save();
document.getElementById("text").value="";
render();
}

/* DELETE */
function deleteComment(i){
comments.splice(i,1);
save();
render();
}

/* RENDER */
function render(){

let list = document.getElementById("list");
list.innerHTML="";

comments.forEach((c,i)=>{
list.innerHTML += `
<div class="comment">
<button class="delete" onclick="deleteComment(${i})">X</button>
<div>${c.text}</div>
<small>${c.time}</small>
</div>
`;
});

}

</script>

</body>
</html>
